
<!DOCTYPE html>
<html>
<head>
<title>Kartu Lebaran Kang Reyz</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b3d2e,#0f7a55);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
width:380px;
animation:fade 2s;
}

img{
width:100%;
border-radius:15px;
margin-top:15px;
}

@keyframes fade{
from{opacity:0;transform:scale(0.7)}
to{opacity:1;transform:scale(1)}
}

.star{
position:absolute;
color:white;
animation:blink 2s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}
</style>
</head>

<body>

<div class="card">

<h1>🌙 Eid Mubarak</h1>
<h3>1447 H • 2026</h3>

<p>Mohon Maaf Lahir dan Batin</p>

<img src="foto-keluarga.jpg">

<p><b>Keluarga Kang Reyz</b></p>

</div>

<script>
for(let i=0;i<40;i++){
let star=document.createElement("div");
star.className="star";
star.innerHTML="✨";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
star.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(star);
}
</script>

</body>
</html>
